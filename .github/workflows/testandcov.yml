name: pytest

# Run this workflow for pull requests and pushes to main.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-coverage:
    name: Test and Cov py ${{ matrix.python-version }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
        # Linux runs the full version matrix (it backs the 3.10-3.14 support
        # claim). minisim is pure Python, so Windows only needs to guard path /
        # file-I/O behavior: run it on the oldest and newest Python only. macOS
        # is dropped -- behaviorally ≈ Linux for pure Python.
        - os: "windows-latest"
          python-version: "3.11"
        - os: "windows-latest"
          python-version: "3.12"
        - os: "windows-latest"
          python-version: "3.13"
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ffmpeg (Linux runs the video file-I/O tests)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Install minisim and test dependencies
        run: |
          python -m pip install "pdm>=2.26.9"
          pdm install --with test
      - name: Run tests and collect coverage
        run: |
          pdm run test
      - name: Generate xml coverage report
        if: ${{ runner.os == 'Linux' }}
        run: |
          pdm run coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ runner.os == 'Linux' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
