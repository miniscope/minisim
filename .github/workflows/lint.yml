name: lint

# Run this workflow for pull requests and pushes to main.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff Linting
        run: ruff check minisim
      - name: Ruff Format
        run: ruff format --check minisim

  typecheck:
    name: pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: install pdm
        run: python -m pip install "pdm>=2.26.9"
      # An in-project .venv so pyright (configured with venv=".venv") resolves the
      # installed numpy/pydantic/xarray/zarr/mediapy stubs. `test` pulls the
      # notebook extra, which provides mediapy for video.py's import.
      - name: install project + deps
        run: |
          pdm config venv.in_project true
          pdm install --with test
      - name: install pyright into the venv
        run: pdm run pip install "pyright>=1.1.390"
      - name: Pyright type check
        run: pdm run pyright

  lock:
    name: lockfile current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: install pdm
        # exclude-newer in [tool.pdm.resolution] requires PDM >= 2.26.9; see pyproject.toml
        run: python -m pip install "pdm>=2.26.9"
      - name: check lockfile
        run: pdm lock --check --with :all
