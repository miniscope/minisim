name: readthedocs PR Preview links
on:
  pull_request_target:
    types:
      - opened

permissions:
  pull-requests: write

jobs:
  documentation-links:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA (not a mutable tag): this job runs on
      # pull_request_target, so it has a write token and base-repo secrets, and a
      # moved tag would run untrusted code in that privileged context.
      - uses: readthedocs/actions/preview@b8bba1484329bda1a3abe986df7ebc80a8950333 # v1.5
        with:
          project-slug: "minisim"
